<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
</head>
<body>

<h2>Reset Password</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="password"
           name="password"
           placeholder="New Password"
           required>

    <br><br>

    <input type="password"
           name="confirm"
           placeholder="Confirm Password"
           required>

    <br><br>

    <button type="submit">
        Reset Password
    </button>

</form>

</body>
</html>
