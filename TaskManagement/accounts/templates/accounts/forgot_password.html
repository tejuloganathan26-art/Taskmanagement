<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body>

<h2>Forgot Password</h2>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="email"
           name="email"
           placeholder="Enter your Email"
           required>

    <button type="submit">
        Send OTP
    </button>

</form>

</body>
</html>
