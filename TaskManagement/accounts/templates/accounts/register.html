<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#084298;
        }

        .error{
            color:red;
            text-align:center;
        }

        .success{
            color:green;
            text-align:center;
        }

        p{
            text-align:center;
        }

        a{
            text-decoration:none;
            color:#0d6efd;
        }
    </style>

</head>
<body>

<div class="container">

<h2>Register</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if success %}
<p class="success">{{ success }}</p>
{% endif %}

<form method="POST">

    {% csrf_token %}

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit">
        Register
    </button>

</form>

<p>
Already have an account?
<a href="{% url 'login' %}">Login</a>
</p>

</div>

</body>
</html>
