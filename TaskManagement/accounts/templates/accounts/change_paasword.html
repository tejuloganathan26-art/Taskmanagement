{% extends 'base.html' %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<style>

.change-password-container{
    width:450px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,.2);
}

.change-password-container h2{
    text-align:center;
    color:#1e3c72;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

.form-group input:focus{
    border-color:#1e3c72;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#1e3c72;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#16325c;
}

.message{
    text-align:center;
    color:red;
    margin-bottom:15px;
}

.back{
    margin-top:20px;
    text-align:center;
}

.back a{
    text-decoration:none;
    color:#1e3c72;
    font-weight:bold;
}

</style>

<div class="change-password-container">

    <h2>Change Password</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="message">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="form-group">

            <label>Current Password</label>

            <input
                type="password"
                name="current_password"
                placeholder="Enter Current Password"
                required>

        </div>

        <div class="form-group">

            <label>New Password</label>

            <input
                type="password"
                name="new_password"
                placeholder="Enter New Password"
                required>

        </div>

        <div class="form-group">

            <label>Confirm New Password</label>

            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm New Password"
                required>

        </div>

        <button type="submit">
            Change Password
        </button>

    </form>

    <div class="back">

        <a href="{% url 'login' %}">
            Back to Login
        </a>

    </div>

</div>

{% endblock %}
